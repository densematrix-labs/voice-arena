<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0a0a0f"/>
  <g fill="#00ff9f">
    <rect x="15" y="35" width="8" height="30" rx="4">
      <animate attributeName="height" values="30;50;30" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="35;25;35" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="25" width="8" height="50" rx="4">
      <animate attributeName="height" values="50;30;50" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="25;35;25" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="45" y="20" width="8" height="60" rx="4">
      <animate attributeName="height" values="60;40;60" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="20;30;20" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="25" width="8" height="50" rx="4">
      <animate attributeName="height" values="50;35;50" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="25;32;25" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="75" y="30" width="8" height="40" rx="4">
      <animate attributeName="height" values="40;55;40" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="30;22;30" dur="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
